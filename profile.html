<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | Pinglo</title>
  <link rel="icon" href="./pinglo-icon.svg" type="image/svg+xml">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #08041f;
      color: #f7f3ff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(720px, 100%);
      border: 1px solid rgba(187, 166, 255, 0.19);
      border-radius: 22px;
      background: rgba(18, 15, 52, 0.86);
      padding: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
    }

    .profile-head {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .avatar {
      width: 78px;
      height: 78px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #7a3cff, #19d4ff);
      background-size: cover;
      background-position: center;
      font-size: 1.4rem;
      font-weight: 900;
    }

    a, button {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 12px;
      border: 0;
      background: #7a3cff;
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      cursor: pointer;
    }

    .muted { color: #b9abd6; }
    .posts { display: grid; gap: 10px; margin-top: 22px; }
    .post { border: 1px solid rgba(187, 166, 255, 0.19); border-radius: 14px; padding: 14px; background: rgba(255,255,255,0.04); }
  </style>
</head>
<body>
  <main class="card">
    <div class="profile-head">
      <div class="avatar" id="avatar">PG</div>
      <div>
        <h1 id="name">Profile</h1>
        <p class="muted" id="handle">@you</p>
      </div>
    </div>
    <p class="muted" id="bio"></p>
    <a href="./home.html#profile">Open full profile</a>
    <section class="posts" id="posts"></section>
  </main>

  <script>
    const STORAGE_KEY = "pinglo:production:v2";
    const account = readJson("pinglo_account") || {};
    const state = readJson(STORAGE_KEY) || {};
    const profile = { ...(state.profile || {}), ...account };
    document.getElementById("name").textContent = profile.name || "Pinglo User";
    document.getElementById("handle").textContent = profile.handle || "@you";
    document.getElementById("bio").textContent = profile.bio || "Your Pinglo profile is managed from the main app.";
    const avatar = document.getElementById("avatar");
    if (profile.picture) {
      avatar.style.backgroundImage = `url("${profile.picture}")`;
      avatar.textContent = "";
    } else {
      avatar.textContent = initials(profile.name || profile.handle || "PG");
    }
    const posts = (state.posts || []).filter((post) => post.authorId === profile.id);
    document.getElementById("posts").innerHTML = posts.length
      ? posts.map((post) => `<article class="post">${escapeHtml(post.content)}</article>`).join("")
      : `<p class="muted">No posts yet.</p>`;

    function readJson(key) {
      try { return JSON.parse(localStorage.getItem(key) || "null"); } catch { return null; }
    }
    function initials(value) {
      return String(value || "PG").trim().split(/\s+/).slice(0, 2).map((part) => part[0]).join("").toUpperCase() || "PG";
    }
    function escapeHtml(value) {
      return String(value || "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }
  </script>
</body>
</html>
